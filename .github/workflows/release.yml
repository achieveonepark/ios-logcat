name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "iOS LogCat ${{ github.ref_name }}"
          releaseBody: |
            ## iOS LogCat ${{ github.ref_name }}

            아래 **Assets**에서 OS에 맞는 설치파일을 받으세요.

            | OS | 파일 |
            |----|------|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Windows | `.msi` 또는 `.exe` (NSIS) |

            > ⚠️ 코드 서명이 안 돼 있어 첫 실행 시 Gatekeeper / SmartScreen 경고가 뜰 수 있습니다.
            > macOS: 우클릭 → 열기 · Windows: "추가 정보 → 실행".

            사전 요구사항: [libimobiledevice](https://libimobiledevice.org) (`idevicesyslog` 제공). README 참고.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
